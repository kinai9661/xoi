<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 圖片生成工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        textarea, select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        textarea:focus, select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 6px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result.success {
            border-left: 4px solid #4caf50;
        }
        
        .result.error {
            border-left: 4px solid #f44336;
        }
        
        .result-title {
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .image-item {
            background: white;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .image-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        
        .image-item a {
            display: block;
            padding: 10px;
            text-align: center;
            background: #f0f0f0;
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
            word-break: break-all;
            transition: background 0.3s;
        }
        
        .image-item a:hover {
            background: #e0e0e0;
        }
        
        .error-message {
            color: #f44336;
            padding: 15px;
            background: #ffebee;
            border-radius: 6px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .form-row, .form-row-3 {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .image-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 AI 圖片生成工具</h1>
            <p>使用先進的 AI 模型生成高質量圖片</p>
        </div>
        
        <div class="content">
            <form id="generateForm">
                <div class="form-group">
                    <label for="prompt">📝 圖片描述</label>
                    <textarea id="prompt" placeholder="詳細描述你想要生成的圖片..." required></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="model">🤖 模型選擇</label>
                        <select id="model">
                            <option value="grok-image">grok-image (快速)</option>
                            <option value="qwen-image">qwen-image (中文優化)</option>
                            <option value="glm-image">glm-image (多模態)</option>
                            <option value="gpt-image-1">gpt-image-1 (高質量)</option>
                            <option value="gpt-image-1.5">gpt-image-1.5 (最佳效果)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="size">📐 圖片尺寸</label>
                        <select id="size">
                            <option value="512x512">512x512 (小)</option>
                            <option value="1024x1024" selected>1024x1024 (標準)</option>
                            <option value="1792x1024">1792x1024 (寬屏)</option>
                            <option value="1024x1792">1024x1792 (豎屏)</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row-3">
                    <div class="form-group">
                        <label for="quality">⭐ 質量</label>
                        <select id="quality">
                            <option value="standard" selected>標準</option>
                            <option value="hd">高清</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="style">🎭 風格</label>
                        <select id="style">
                            <option value="natural" selected>自然</option>
                            <option value="vivid">鮮豔</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="n">🔢 生成數量</label>
                        <input type="number" id="n" min="1" max="10" value="1">
                    </div>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn-primary">🚀 生成圖片</button>
                    <button type="reset" class="btn-secondary">🔄 重置</button>
                </div>
            </form>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在生成圖片，請稍候...</p>
            </div>
            
            <div class="result" id="result">
                <div class="result-title" id="resultTitle"></div>
                <div id="resultContent"></div>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('generateForm');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultContent = document.getElementById('resultContent');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const prompt = document.getElementById('prompt').value;
            const model = document.getElementById('model').value;
            const size = document.getElementById('size').value;
            const quality = document.getElementById('quality').value;
            const style = document.getElementById('style').value;
            const n = parseInt(document.getElementById('n').value);
            
            loading.classList.add('show');
            result.classList.remove('show', 'success', 'error');
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prompt,
                        model,
                        size,
                        quality,
                        style,
                        n
                    })
                });
                
                const data = await response.json();
                
                loading.classList.remove('show');
                
                if (!response.ok) {
                    result.classList.add('show', 'error');
                    resultTitle.textContent = '❌ 生成失敗';
                    resultContent.innerHTML = `<div class="error-message">${data.error || '未知錯誤'}</div>`;
                    return;
                }
                
                if (data.data && data.data.length > 0) {
                    result.classList.add('show', 'success');
                    resultTitle.textContent = `✅ 成功生成 ${data.data.length} 張圖片`;
                    
                    const imageGrid = document.createElement('div');
                    imageGrid.className = 'image-grid';
                    
                    data.data.forEach((img, index) => {
                        const item = document.createElement('div');
                        item.className = 'image-item';
                        item.innerHTML = `
                            <img src="${img.url}" alt="生成的圖片 ${index + 1}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3E圖片加載失敗%3C/text%3E%3C/svg%3E'">
                            <a href="${img.url}" target="_blank" title="在新標籤頁打開">查看原圖</a>
                        `;
                        imageGrid.appendChild(item);
                    });
                    
                    resultContent.innerHTML = '';
                    resultContent.appendChild(imageGrid);
                } else {
                    result.classList.add('show', 'error');
                    resultTitle.textContent = '❌ 生成失敗';
                    resultContent.innerHTML = '<div class="error-message">未收到圖片數據</div>';
                }
            } catch (error) {
                loading.classList.remove('show');
                result.classList.add('show', 'error');
                resultTitle.textContent = '❌ 請求失敗';
                resultContent.innerHTML = `<div class="error-message">${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
